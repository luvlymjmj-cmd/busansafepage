<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Foreigner Safety Platform</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1d3a; /* 이미지 배경과 어울리는 딥 네이비 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 100%;
            width: 100%;
            max-width: 600px; /* 모바일 맞춤형 최적 크기 */
            position: relative;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 이미지 위의 터치 영역 공통 스타일 */
        .touch-link {
            position: absolute;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0); /* 터치 영역 디자인 확인 시 0을 0.3으로 바꾸면 붉은 영역이 보입니다 */
            border-radius: 12px;
        }
        
        /* [언어 선택 버튼 영역] */
        .btn-en {
            top: 56.6%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        .btn-cn {
            top: 63.4%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        .btn-jp {
            top: 70.2%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        .btn-vn {
            top: 77.0%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }

        /* [전화걸기 터치 영역] - 이미지 하단 버튼 위치 맞춤 */
        .phone-link {
            position: absolute;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0); 
            border-radius: 8px;
            height: 8.5%;
            top: 83.5%;
        }
        /* 112 경찰 연결 */
        .call-112 {
            left: 7.0%;
            width: 27.5%;
        }
        /* 119 소방 연결 */
        .call-119 {
            left: 36.5%;
            width: 27.5%;
        }
        /* 1330 관광 안내 연결 */
        .call-1330 {
            left: 66.0%;
            width: 27.5%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 메인 대표 이미지 (처음 접속 시 home.png 표시) -->
        <img id="display-image" src="home.png" alt="Busan Foreigner Safety Platform">

        <!-- 언어 선택 터치 영역 (클릭 시 main_OO.png 이미지들로 즉시 변경) -->
        <div class="touch-link btn-en" onclick="changeImage('main_en.png')" title="English"></div>
        <div class="touch-link btn-cn" onclick="changeImage('main_cn.png')" title="中文"></div>
        <div class="touch-link btn-jp" onclick="changeImage('main_jp.png')" title="日本語"></div>
        <div class="touch-link btn-vn" onclick="changeImage('main_vn.png')" title="Tiếng Việt"></div>

        <!-- 긴급 전화 연결 터치 영역 (스마트폰에서 터치하면 바로 전화 걸기 팝업이 뜹니다) -->
        <a href="tel:112" class="phone-link call-112" title="Call 112"></a>
        <a href="tel:119" class="phone-link call-119" title="Call 119"></a>
        <a href="tel:1330" class="phone-link call-1330" title="Call 1330"></a>
    </div>

    <script>
        // 이미지를 슥슥 부드럽게 바꿔주고 화면을 맨 위로 올려주는 마법의 기능
        function changeImage(imageName) {
            document.getElementById('display-image').src = imageName;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
