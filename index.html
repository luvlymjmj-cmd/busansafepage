<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Foreigner Safety Platform</title>
    <style>
        /* 화면 전체 여백과 패딩을 0으로 만들어 사진이 위아래 가득 차게 합니다 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b1d3a; /* 이미지 배경과 일치하는 딥 네이비 */
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 600px; /* 모바일 가로 가득 참 유지 */
            margin: 0 auto;
            position: relative;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }
        /* 이미지 위에 올라가는 실제 터치 감지 영역 */
        .touch-link {
            position: absolute;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0); /* 완전 투명 (동작 테스트 시 투명하게 숨김) */
            border-radius: 12px;
        }

        /* 1. English 영역 (이미지 내부 흰 버튼 위치) */
        .btn-en {
            top: 55.6%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        /* 2. 中文 영역 */
        .btn-cn {
            top: 62.4%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        /* 3. 日本語 영역 */
        .btn-jp {
            top: 69.2%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        /* 4. Tiếng Việt 영역 */
        .btn-vn {
            top: 76.0%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }

        /* 5. 긴급전화 공통 높이 및 위치 */
        .phone-link {
            position: absolute;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0); 
            height: 10.5%; /* 전화번호 영역 높이 감지 */
            top: 81.5%;
        }
        /* 112 경찰 터치 영역 */
        .call-112 {
            left: 6.7%;
            width: 27.5%;
        }
        /* 119 소방 터치 영역 */
        .call-119 {
            left: 36.2%;
            width: 27.5%;
        }
        /* 1330 관광안내 터치 영역 */
        .call-1330 {
            left: 65.8%;
            width: 27.5%;
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="display-image" src="home.png" alt="Busan Foreigner Safety Platform">

        <div class="touch-link btn-en" onclick="changeImage('main_en.png')" title="English"></div>
        <div class="touch-link btn-cn" onclick="changeImage('main_cn.png')" title="中文"></div>
        <div class="touch-link btn-jp" onclick="changeImage('main_jp.png')" title="日本語"></div>
        <div class="touch-link btn-vn" onclick="changeImage('main_vn.png')" title="Tiếng Việt"></div>

        <a href="tel:112" class="phone-link call-112" title="Call 112"></a>
        <a href="tel:119" class="phone-link call-119" title="Call 119"></a>
        <a href="tel:1330" class="phone-link call-1330" title="Call 1330"></a>
    </div>

    <script>
        // 클릭 시 이미지만 변경하고 부드럽게 위로 정렬시키는 기능
        function changeImage(imageName) {
            document.getElementById('display-image').src = imageName;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
