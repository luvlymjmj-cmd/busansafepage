<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메디컬 정보 안내</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 중앙 카드 컨테이너 */
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        /* 병원 로고나 제목 아이콘 느낌 */
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            color: #333333;
            margin-bottom: 25px;
        }

        /* 언어 선택 라디오/버튼 그룹 */
        .lang-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 35px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 1px solid #dee2e6;
            background-color: #ffffff;
            color: #495057;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        /* 선택된 언어 스타일 */
        .lang-btn.active {
            background-color: #007bff;
            color: #ffffff;
            border-color: #007bff;
        }

        /* 메디컬 정보 메인 버튼 */
        .action-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #28a745;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background-color: #218838;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🏥</div>
        <h1 id="titleText">메디컬 정보 안내</h1>

        <!-- 언어 선택 버튼 -->
        <div class="lang-group">
            <button class="lang-btn active" onclick="setLanguage('ko', this)">한국어</button>
            <button class="lang-btn" onclick="setLanguage('en', this)">English</button>
            <button class="lang-btn" onclick="setLanguage('zh', this)">中文</button>
            <button class="lang-btn" onclick="setLanguage('vi', this)">Tiếng Việt</button>
            <button class="lang-btn" onclick="setLanguage('ja', this)">日本語</button>
        </div>

        <!-- 클릭 시 해당 언어 이미지로 연결되는 버튼 -->
        <a href="" id="medicalInfoLink" class="action-btn" target="_blank">
            메디컬 정보 보기
        </a>
    </div>

    <script>
        // 다국어 텍스트 매핑 데이터
        const langData = {
            'ko': { title: '메디컬 정보 안내', btn: '메디컬 정보 보기', suffix: 'ko' },
            'en': { title: 'Medical Information', btn: 'View Medical Info', suffix: 'en' },
            'zh': { title: '医疗信息 📊', btn: '查看医疗信息', suffix: 'cn' }, // 파일명 매핑인 cn으로 지정
            'vi': { title: 'Thông tin Y tế', btn: 'Xem thông tin y tế', suffix: 'vn' }, // 파일명 매핑인 vn으로 지정
            'ja': { title: '医療情報のご案内', btn: '医療情報を見る', suffix: 'jp' }
        };

        function setLanguage(langCode, element) {
            // 1. html 태그의 lang 속성 변경
            document.documentElement.lang = langCode;

            // 2. 활성화된 버튼 디자인 변경
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // 3. 언어별 데이터 가져오기 (없으면 영어 세팅)
            const currentData = langData[langCode] || langData['en'];

            // 4. 화면 글자 동적 변경
            document.getElementById('titleText').textContent = currentData.title;
            
            const actionBtn = document.getElementById('medicalInfoLink');
            actionBtn.textContent = currentData.btn;

            // 5. 업로드하신 이미지 파일명 양식 적용
            // 이미지들이 index.html과 같은 폴더에 있다면 아래 그대로 쓰시면 됩니다.
            // 만약 images 폴더 안에 있다면 주소를 `./images/medical-info-${currentData.suffix}.png` 로 변경하세요.
            actionBtn.href = `./medical-info-${currentData.suffix}.png`;
        }

        // 페이지 처음 열릴 때 기본값(한국어)으로 세팅 적용
        window.addEventListener('DOMContentLoaded', () => {
            const defaultBtn = document.querySelector('.lang-btn.active');
            setLanguage('ko', defaultBtn);
        });
    </script>

</body>
</html>
