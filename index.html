-201&keyword=" target="_blank" class="touch-link click-lost" style="display: none;"></a>
        <div id="click-rule" class="touch-link click-rules" onclick="showPage('sub-rules')" style="display: none;"></div>
        <a id="click-spot" href="https://www.visitbusan.net/index.do" target="_blank" class="touch-link click-spots" style="display: none;"></a>

        <!-- [병원 이미지 스크린 전용 외부 사이트 아웃링크 버튼] -->
        <a id="go-ext-hospital" href="https://www.busan.go.kr/eng/bsmedical01" target="_blank" class="touch-link hospital-ext-link" style="display: none;"></a>
    </div>

    <script>
        var currentLang = 'home'; 

        function showPage(pageId) {
            document.getElementById('langDropdown').style.display = 'none';

            var images = document.getElementsByClassName('main-img');
            for (var i = 0; i < images.length; i++) {
                images[i].classList.remove('active');
            }

            document.getElementById('img-' + pageId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if(pageId === 'en' || pageId === 'cn' || pageId === 'jp' || pageId === 'vn') {
                currentLang = pageId;
            }

            var isHome = (pageId === 'home');
            var isMainLang = (pageId === 'en' || pageId === 'cn' || pageId === 'jp' || pageId === 'vn');
            var isHospitalSub = pageId.includes('hospital');
            var isPharmacySub = pageId.includes('pharmacy');
            var isMedInfoSub = (pageId === 'sub-medinfo'); // 메디컬 정보 서브페이지 체크

            // 1. 최초 홈화면(home.png) 전용 레이어 제어
            document.getElementById('area-en').style.display = isHome ? 'block' : 'none';
            document.getElementById('area-cn').style.display = isHome ? 'block' : 'none';
            document.getElementById('area-jp').style.display = isHome ? 'block' : 'none';
            document.getElementById('area-vn').style.display = isHome ? 'block' : 'none';
            document.getElementById('h-112').style.display = isHome ? 'block' : 'none';
            document.getElementById('h-119').style.display = isHome ? 'block' : 'none';
            document.getElementById('h-1330').style.display = isHome ? 'block' : 'none';

            // 2. 상단 내비게이션 바 제어 (홈화면이 아닐 때 작동)
            document.getElementById('area-lang-dropdown').style.display = !isHome ? 'block' : 'none';

            // 3. 긴급 전화 버튼 스마트 통제 (메인, 병원, 약국, 메디컬 정보 등 모든 곳에서 터치 보장)
            if (isHome) {
                document.getElementById('c-112').style.display = 'none';
                document.getElementById('c-119').style.display = 'none';
                document.getElementById('c-1330').style.display = 'none';
            } else if (isHospitalSub || isPharmacySub || isMedInfoSub) {
                // 병원, 약국, 메디컬 정보 스크린에서는 디자인에 맞춰 112, 119만 활성화 (1330은 완전히 숨김)
                document.getElementById('c-112').style.display = 'block';
                document.getElementById('c-119').style.display = 'block';
                document.getElementById('c-1330').style.display = 'none';
            } else {
                // 국가별 메인 및 기타 서브화면은 원래대로 3개 모두 활성화
                document.getElementById('c-112').style.display = 'block';
                document.getElementById('c-119').style.display = 'block';
                document.getElementById('c-1330').style.display = 'block';
            }
            
            // 4. 국가별 메인 가이드 화면일 때만 6대 하부 메뉴 칸 터치 활성화
            document.getElementById('click-hosp').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-phar').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-emba').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-lost').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-rule').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-spot').style.display = isMainLang ? 'block' : 'none';

            // 5. 병원 내부 상세 이미지 스크린일 때만 외부 링크 레이어 가동
            document.getElementById('go-ext-hospital').style.display = isHospitalSub ? 'block' : 'none';
        }

        function toggleDropdown(event) {
            event.stopPropagation(); 
            var dropdown = document.getElementById('langDropdown');
            if (dropdown.style.display === 'block') {
                dropdown.style.display = 'none';
            } else {
                dropdown.style.display = 'block';
            }
        }

        function changeLanguageDirect(langCode) {
            document.getElementById('langDropdown').style.display = 'none';
            showPage(langCode);
        }

        document.addEventListener('click', function() {
            document.getElementById('langDropdown').style.display = 'none';
        });

        function clickSubMenu(type) {
            if (type === 'hospital') {
                var extLink = document.getElementById('go-ext-hospital');
                if (currentLang === 'en') extLink.href = "https://www.busan.go.kr/eng/bsmedical01";
                if (currentLang === 'cn') extLink.href = "https://www.busan.go.kr/chn/bsmedical01";
                if (currentLang === 'jp') extLink.href = "https://www.busan.go.kr/jap/bsmedical01";
                if (currentLang === 'vn') extLink.href = "https://www.busan.go.kr/eng/bsmedical01";

                showPage('sub-hospital-' + currentLang);
            } else if (type === 'pharmacy') {
                // 🔥 메디컬 정보 버튼을 누르면 새로 연동한 공통 안내 이미지 페이지로 이동합니다.
                showPage('sub-medinfo');
            }
        }
    </script>

</body>
</html>
