<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Safe Guide</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            /* 상단 바가 사라졌으므로 위쪽 여백을 약간 줍니다 */
            padding-top: 20px;
        }
        /* 공통 버튼 스타일 */
        .lang-btn {
            background-color: #4CAF50; /* 버튼 색상 */
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 15px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .lang-btn:hover {
            background-color: #45a049; /* 마우스 올렸을 때 색상 */
        }
        /* 메인 이미지 영역 */
        .image-container {
            max-width: 600px;
            margin: 0 auto; /* 위아래 여백을 0으로 조정 */
            background: white;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .main-img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 중간 언어 선택 버튼 영역 */
        .mid-nav {
            margin-top: 30px;
            margin-bottom: 30px;
            padding: 20px;
            background: #e9e9e9;
        }
        .mid-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
    </style>
</head>
<body>

    <!-- [중앙] 메인 이미지 표시 영역 (기본값: home.png) -->
    <div class="image-container">
        <img id="display-image" class="main-img" src="home.png" alt="Busan Safe Guide">
    </div>

    <!-- [중간] 언어 선택 영역 (실제 클릭하여 이미지를 바꾸는 곳) -->
    <div class="mid-nav">
        <div class="mid-title">Please select your language / 언어를 선택해 주세요</div>
        <!-- 각 버튼을 누르면 해당 언어 이미지 파일로 변경됩니다 -->
        <button class="lang-btn" onclick="changeImage('home.png')">한국어</button>
        <button class="lang-btn" onclick="changeImage('hospital_en.png')">English</button>
        <button class="lang-btn" onclick="changeImage('hospital_cn.png')">中文</button>
        <button class="lang-btn" onclick="changeImage('hospital_jp.png')">日本語</button>
        <button class="lang-btn" onclick="changeImage('hospital_vn.png')">Tiếng Việt</button>
    </div>

    <!-- 이미지를 교체해주는 자바스크립트 기능 -->
    <script>
        function changeImage(imageName) {
            // 이미지 태그의 src를 클릭한 이미지 파일명으로 변경
            document.getElementById('display-image').src = imageName;
            // 이미지를 바꾼 후, 화면 맨 위(이미지 시작 부분)로 스크롤 이동
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
