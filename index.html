<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Foreigner Safety Platform</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b1d3a;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        .main-img {
            width: 100%;
            height: auto;
            display: none;
        }
        .main-img.active {
            display: block;
        }
        
        /* 투명 터치 레이어 기본 설정 */
        .touch-link {
            position: absolute;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0);
            z-index: 10;
            /* 💡 위치가 잘 맞는지 빨간색 박스로 테스트해보고 싶다면 아래 주석(#)을 지우세요 */
            /* background-color: rgba(255, 0, 0, 0.3); */
        }

        /* [최우선 레이어] 상단바 및 전화 버튼은 맨 위층으로 고정 */
        .layer-top-priority {
            z-index: 99; 
        }

        /* [첫 메인화면(home.png) 내 국가별 버튼] */
        .btn-en { top: 55.6%; left: 6.7%; width: 86.6%; height: 6.2%; border-radius: 12px; }
        .btn-cn { top: 62.4%; left: 6.7%; width: 86.6%; height: 6.2%; border-radius: 12px; }
        .btn-jp { top: 69.2%; left: 6.7%; width: 86.6%; height: 6.2%; border-radius: 12px; }
        .btn-vn { top: 76.0%; left: 6.7%; width: 86.6%; height: 6.2%; border-radius: 12px; }

        /* [하단 전화걸기 영역 - 홈 및 베이직룰스 공용] */
        .home-phone { height: 10.5%; top: 81.5%; }
        .home-112 { left: 6.7%; width: 27.5%; }
        .home-119 { left: 36.2%; width: 27.5%; }
        .home-1330 { left: 65.8%; width: 27.5%; }

        /* [상단 내비게이션 터치 영역 (지구본)] */
        .btn-lang-dropdown { top: 0.5%; left: 2.0%; width: 25.0%; height: 4.5%; } 

        /* [중간 큰 전화 버튼 3개] */
        .call-112 { top: 29.5%; left: 2.5%; width: 30.0%; height: 14.5%; }
        .call-119 { top: 29.5%; left: 35.0%; width: 30.0%; height: 14.5%; }
        .call-1330 { top: 29.5%; left: 67.5%; width: 30.0%; height: 14.5%; }

        /* [국가별 메인화면 글자 칸 맞춤 터치 영역] */
        .click-hospital  { top: 45.4%; left: 2.5%; width: 46.5%; height: 14.0%; }
        .click-pharmacy  { top: 45.4%; left: 51.0%; width: 46.5%; height: 14.0%; }
        .click-embassy   { top: 62.0%; left: 2.5%; width: 46.5%; height: 14.0%; }
        .click-lost      { top: 62.0%; left: 51.0%; width: 46.5%; height: 14.0%; }
        .click-rules     { top: 78.0%; left: 2.5%; width: 46.5%; height: 14.0%; }
        .click-spots     { top: 78.0%; left: 51.0%; width: 46.5%; height: 14.0%; }

        /* 🌟 병원이미지 내부에서 [메디컬 정보]를 누르는 터치 레이어 위치 설정 */
        /* (현재 병원 외부링크 레이어와 같은 크기/위치로 잡아두었습니다. 필요시 수치 조절 가능) */
        .click-medical-info { top: 45.0%; left: 5.0%; width: 90.0%; height: 12.0%; z-index: 15; }

        /* 병원 이미지 내부 최하단 외부 링크 영역 */
        .hospital-ext-link { top: 82.0%; left: 5.0%; width: 90.0%; height: 12.0%; z-index: 5; }

        /* 언어 선택 드롭다운 메뉴 스타일 */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 5.0%; 
            left: 2.0%;
            width: 145px;
            background-color: #12284c;
            border: 1px solid #234375;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            z-index: 999; 
            padding: 5px 0;
        }
        .dropdown-menu a {
            display: block;
            color: #ffffff;
            padding: 10px 15px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px solid #1c3966;
        }
        .dropdown-menu a:last-child {
            border-bottom: none;
        }
        .dropdown-menu a:active {
            background-color: #1c3966;
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="img-home" class="main-img active" src="home.png" alt="Home">
        <img id="img-en" class="main-img" src="main_en.png" alt="English">
        <img id="img-cn" class="main-img" src="main_cn.png" alt="Chinese">
        <img id="img-jp" class="main-img" src="main_jp.png" alt="Japanese">
        <img id="img-vn" class="main-img" src="main_vn.png" alt="Vietnamese">

        <img id="img-sub-rules" class="main-img" src="basicrules.png" alt="Basic Rules">
        <img id="img-sub-embassy" class="main-img" src="embassy.png" alt="Embassies">

        <!-- 🌟 원상복구: 국가별 메인에서 병원을 누르면 뜨는 원래 병원 안내 이미지들입니다 -->
        <img id="img-sub-hospital-en" class="main-img" src="hospital_en.png" alt="Hospital EN">
        <img id="img-sub-hospital-cn" class="main-img" src="hospital_cn.png" alt="Hospital CN">
        <img id="img-sub-hospital-jp" class="main-img" src="hospital_jp.png" alt="Hospital JP">
        <img id="img-sub-hospital-vn" class="main-img" src="hospital_vn.png" alt="Hospital VN">

        <!-- 🌟 새로 분리 등록: 병원 화면에서 버튼을 누르면 뜨게 될 언어별 메디컬 정보 이미지들입니다 -->
        <img id="img-medical-info-en" class="main-img" src="medical-info-en.png" alt="Medical Info EN">
        <img id="img-medical-info-cn" class="main-img" src="medical-info-cn.png" alt="Medical Info CN">
        <img id="img-medical-info-jp" class="main-img" src="medical-info-jp.png" alt="Medical Info JP">
        <img id="img-medical-info-vn" class="main-img" src="medical-info-vn.png" alt="Medical Info VN">

        <img id="img-sub-pharmacy-en" class="main-img" src="pharmacy_en.png" alt="Pharmacy EN">
        <img id="img-sub-pharmacy-cn" class="main-img" src="pharmacy_cn.png" alt="Pharmacy CN">
        <img id="img-sub-pharmacy-jp" class="main-img" src="pharmacy_jp.png" alt="Pharmacy JP">
        <img id="img-sub-pharmacy-vn" class="main-img" src="pharmacy_vn.png" alt="Pharmacy VN">


        <div id="area-en" class="touch-link btn-en" onclick="showPage('en')"></div>
        <div id="area-cn" class="touch-link btn-cn" onclick="showPage('cn')"></div>
        <div id="area-jp" class="touch-link btn-jp" onclick="showPage('jp')"></div>
        <div id="area-vn" class="touch-link btn-vn" onclick="showPage('vn')"></div>

        <a id="h-112" href="tel:112" class="touch-link home-phone home-112"></a>
        <a id="h-119" href="tel:119" class="touch-link home-phone home-119"></a>
        <a id="h-1330" href="tel:1330" class="touch-link home-phone home-1330"></a>

        <div id="area-lang-dropdown" class="touch-link btn-lang-dropdown layer-top-priority" onclick="toggleDropdown(event)" style="display: none;"></div>

        <div id="langDropdown" class="dropdown-menu">
            <a href="#" onclick="changeLanguageDirect('home')">🏠 메인 (Home)</a>
            <a href="#" onclick="changeLanguageDirect('en')">🇺🇸 English</a>
            <a href="#" onclick="changeLanguageDirect('cn')">🇨🇳 中文 (简体)</a>
            <a href="#" onclick="changeLanguageDirect('jp')">🇯🇵 日本語</a>
            <a href="#" onclick="changeLanguageDirect('vn')">🇻🇳 Tiếng Việt</a>
        </div>

        <a id="c-112" href="tel:112" class="touch-link call-112 layer-top-priority" style="display: none;"></a>
        <a id="c-119" href="tel:119" class="touch-link call-119 layer-top-priority" style="display: none;"></a>
        <a id="c-1330" href="tel:1330" class="touch-link call-1330 layer-top-priority" style="display: none;"></a>

        <div id="click-hosp" class="touch-link click-hospital" onclick="clickSubMenu('hospital')" style="display: none;"></div>
        <div id="click-phar" class="touch-link click-pharmacy" onclick="clickSubMenu('pharmacy')" style="display: none;"></div>
        <div id="click-emba" class="touch-link click-embassy" onclick="showPage('sub-embassy')" style="display: none;"></div>
        
        <div id="click-lost" class="touch-link click-lost" onclick="goToLostWebsite()" style="display: none;"></div>
        
        <div id="click-rule" class="touch-link click-rules" onclick="showPage('sub-rules')" style="display: none;"></div>
        <a id="click-spot" href="https://www.visitbusan.net/index.do" target="_blank" class="touch-link click-spots" style="display: none;"></a>

        <!-- 🌟 병원 안내 페이지 내부에서 [메디컬 정보] 이미지로 넘겨주는 전용 터치 버튼 영역 -->
        <div id="click-med-info" class="touch-link click-medical-info" onclick="showMedicalInfoPage()" style="display: none;"></div>

        <a id="go-ext-hospital" href="https://www.busan.go.kr/eng/bsmedical01" target="_blank" class="touch-link hospital-ext-link" style="display: none;"></a>
    </div>

    <script>
        var currentLang = 'home'; 

        function showPage(pageId, isBackAction) {
            document.getElementById('langDropdown').style.display = 'none';

            var images = document.getElementsByClassName('main-img');
            for (var i = 0; i < images.length; i++) {
                images[i].classList.remove('active');
            }

            document.getElementById('img-' + pageId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (!isBackAction) {
                history.pushState({ pageId: pageId }, '', '#' + pageId);
            }

            if(pageId === 'en' || pageId === 'cn' || pageId === 'jp' || pageId === 'vn') {
                currentLang = pageId;
            }

            var isHome = (pageId === 'home');
            var isRules = (pageId === 'sub-rules');
            var isMainLang = (pageId === 'en' || pageId === 'cn' || pageId === 'jp' || pageId === 'vn');
            var isHospitalSub = pageId.includes('hospital');
            var isPharmacySub = pageId.includes('pharmacy');
            var isMedicalInfoSub = pageId.includes('medical-info'); // 🌟 메디컬 정보 전용 변수 추가

            // 1. 최초 홈화면 전용 국가 선택 버튼 활성화 제어
            document.getElementById('area-en').style.display = isHome ? 'block' : 'none';
            document.getElementById('area-cn').style.display = isHome ? 'block' : 'none';
            document.getElementById('area-jp').style.display = isHome ? 'block' : 'none';
            document.getElementById('area-vn').style.display = isHome ? 'block' : 'none';
            
            // 홈화면 혹은 베이직 룰스 화면에서만 하단 112, 119, 1330 노출
            var showBottomPhone = isHome || isRules;
            document.getElementById('h-112').style.display = showBottomPhone ? 'block' : 'none';
            document.getElementById('h-119').style.display = showBottomPhone ? 'block' : 'none';
            document.getElementById('h-1330').style.display = showBottomPhone ? 'block' : 'none';

            // 2. 상단 내비게이션 바 제어 (홈화면이 아닐 때 작동)
            document.getElementById('area-lang-dropdown').style.display = !isHome ? 'block' : 'none';

            // 3. 긴급 전화 버튼 스마트 통제 구역 (병원안내 혹은 메디컬정보화면에서는 112, 119만 노출)
            if (isHome) {
                document.getElementById('c-112').style.display = 'none';
                document.getElementById('c-119').style.display = 'none';
                document.getElementById('c-1330').style.display = 'none';
            } else if (isHospitalSub || isPharmacySub || isMedicalInfoSub) {
                document.getElementById('c-112').style.display = 'block';
                document.getElementById('c-119').style.display = 'block';
                document.getElementById('c-1330').style.display = 'none';
            } else {
                document.getElementById('c-112').style.display = 'block';
                document.getElementById('c-119').style.display = 'block';
                document.getElementById('c-1330').style.display = 'block';
            }
            
            // 4. 국가별 메인 가이드 화면일 때만 6대 하부 메뉴 칸 터치 활성화
            document.getElementById('click-hosp').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-phar').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-emba').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-lost').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-rule').style.display = isMainLang ? 'block' : 'none';
            document.getElementById('click-spot').style.display = isMainLang ? 'block' : 'none';

            // 🌟 5. 병원 안내 이미지 페이지(`hospital_xx`)일 때만 [메디컬 정보] 클릭 레이어 가동
            document.getElementById('click-med-info').style.display = isHospitalSub ? 'block' : 'none';

            // 6. 병원 안내 이미지 페이지일 때만 맨 하단 외부 링크 레이어 가동
            document.getElementById('go-ext-hospital').style.display = isHospitalSub ? 'block' : 'none';
        }

        // 브라우저 뒤로가기 버튼 처리 감지
        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.pageId) {
                showPage(event.state.pageId, true);
            } else {
                showPage('home', true);
            }
        });

        // 분실물 외부링크 이동 시 브라우저 히스토리 기억 처리
        function goToLostWebsite() {
            history.pushState({ pageId: currentLang }, '', '#' + currentLang);
            window.open("https://minwon24.police.go.kr/cvlcpt/cvlcptAply.do?cvlcptId=MW-201&keyword=", "_blank");
        }

        // 🌟 병원 안내 이미지 안에서 [메디컬 정보]를 눌렀을 때 새 이미지로 교체해 주는 함수
        function showMedicalInfoPage() {
            showPage('medical-info-' + currentLang);
        }

        function toggleDropdown(event) {
            event.stopPropagation(); 
            var dropdown = document.getElementById('langDropdown');
            if (dropdown.style.display === 'block') {
                dropdown.style.display = 'none';
            } else {
                dropdown.style.display = 'block';
            }
        }

        function changeLanguageDirect(langCode) {
            document.getElementById('langDropdown').style.display = 'none';
            showPage(langCode);
        }

        document.addEventListener('click', function() {
            document.getElementById('langDropdown').style.display = 'none';
        });

        function clickSubMenu(type) {
            if (type === 'hospital') {
                var extLink = document.getElementById('go-ext-hospital');
                if (currentLang === 'en') extLink.href = "https://www.busan.go.kr/eng/bsmedical01";
                if (currentLang === 'cn') extLink.href = "https://www.busan.go.kr/chn/bsmedical01";
                if (currentLang === 'jp') extLink.href = "https://www.busan.go.kr/jap/bsmedical01";
                if (currentLang === 'vn') extLink.href = "https://www.busan.go.kr/eng/bsmedical01";

                showPage('sub-hospital-' + currentLang);
            } else if (type === 'pharmacy') {
                showPage('sub-pharmacy-' + currentLang);
            }
        }

        window.addEventListener('load', function() {
            if (!history.state) {
                history.replaceState({ pageId: 'home' }, '', '#home');
            }
        });
    </script>

</body>
</html>
